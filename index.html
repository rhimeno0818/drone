<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>ヤマタネ100周年 ドローンショー Web ARカメラ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }

        #ar-container { position: relative; width: 100%; height: 100%; }

        #camera-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        /* 画像共通のスタイル */
        .frame-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 2; pointer-events: none;
        }

        /* 縦用画像（初期表示） */
        #frame-portrait {
            -webkit-mask-image: radial-gradient(ellipse 42% 32% at 50% 50%, transparent 95%, black 100%);
            mask-image: radial-gradient(ellipse 42% 32% at 50% 50%, transparent 95%, black 100%);
            display: block; /* 最初は見せる */
        }

        /* 横用画像（最初は隠しておく） */
        #frame-landscape {
            -webkit-mask-image: radial-gradient(ellipse 46% 35% at 50% 50%, transparent 95%, black 100%);
            mask-image: radial-gradient(ellipse 46% 35% at 50% 50%, transparent 95%, black 100%);
            display: none; /* 最初は隠す */
        }

        .ui-layer {
            position: absolute; bottom: 5%; left: 0; width: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        #shutter-btn {
            width: 70px; height: 70px; background-color: #fff;
            border: 5px solid rgba(255,255,255,0.4); border-radius: 50%;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.1s ease;
        }
        #shutter-btn:active { transform: scale(0.9); background-color: #cbd5e1; }

        #hidden-canvas { display: none; }
    </style>
</head>
<body>

    <div id="ar-container">
        <video id="camera-video" autoplay playsinline muted></video>

        <img id="frame-portrait" class="frame-img" src="frame_portrait.png" alt="縦フレーム" onerror="alert('【エラー】縦用画像「frame_portrait.png」が見つかりません');">
        
        <img id="frame-landscape" class="frame-img" src="frame_landscape.png" alt="横フレーム" onerror="alert('【エラー】横用画像「frame_landscape.png」が見つかりません。GitHubのファイル名を確認してください');">

        <div class="ui-layer">
            <button id="shutter-btn" title="写真を撮影"></button>
        </div>
    </div>

    <canvas id="hidden-canvas"></canvas>

    <script>
        const video = document.getElementById('camera-video');
        const framePortrait = document.getElementById('frame-portrait');
        const frameLandscape = document.getElementById('frame-landscape');
        const shutterBtn = document.getElementById('shutter-btn');
        const canvas = document.getElementById('hidden-canvas');
        
        let isLandscape = false;
        let currentFrame = framePortrait; // 今見えている方の画像を記憶する変数

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    video.srcObject = fallbackStream;
                } catch (fallbackErr) {
                    alert("カメラが起動できません。");
                }
            }
        }

        // スマホの傾きを検知して、「表示・非表示」を切り替える
        function updateOrientation() {
            isLandscape = window.innerWidth > window.innerHeight;

            if (isLandscape) {
                // 横向き：縦を隠して横を見せる
                framePortrait.style.display = 'none';
                frameLandscape.style.display = 'block';
                currentFrame = frameLandscape;
            } else {
                // 縦向き：横を隠して縦を見せる
                frameLandscape.style.display = 'none';
                framePortrait.style.display = 'block';
                currentFrame = framePortrait;
            }
        }

        // 回転時のラグ対策（0.3秒待つ）
        window.addEventListener('resize', updateOrientation);
        window.addEventListener('orientationchange', () => {
            setTimeout(updateOrientation, 300);
        });

        function drawCover(ctx, source, isVideo, canvasWidth, canvasHeight) {
            const srcWidth = isVideo ? source.videoWidth : source.naturalWidth;
            const srcHeight = isVideo ? source.videoHeight : source.naturalHeight;
            const imgRatio = srcWidth / srcHeight;
            const canvasRatio = canvasWidth / canvasHeight;
            let sx, sy, sw, sh;

            if (imgRatio > canvasRatio) {
                sh = srcHeight;
                sw = sh * canvasRatio;
                sx = (srcWidth - sw) / 2;
                sy = 0;
            } else {
                sw = srcWidth;
                sh = sw / canvasRatio;
                sx = 0;
                sy = (srcHeight - sh) / 2;
            }
            ctx.drawImage(source, sx, sy, sw, sh, 0, 0, canvasWidth, canvasHeight);
        }

        // シャッターボタン
        shutterBtn.addEventListener('click', () => {
            if (!currentFrame.complete || currentFrame.naturalWidth === 0) {
                alert("画像が見つからないか、読み込み中です。");
                return;
            }

            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 1. カメラ下敷き
            drawCover(ctx, video, true, canvas.width, canvas.height);

            // 2. 型抜き
            ctx.save();
            ctx.beginPath();
            ctx.rect(0, 0, canvas.width, canvas.height);
            
            // 現在の向きに合わせてくり抜きサイズを指定
            let rx = isLandscape ? (canvas.width * 0.46) : (canvas.width * 0.42);
            let ry = isLandscape ? (canvas.height * 0.35) : (canvas.height * 0.32);
            
            ctx.ellipse(canvas.width / 2, canvas.height / 2, rx, ry, 0, 0, 2 * Math.PI);
            ctx.clip('evenodd');

            // 3. 今見えている方のフレームを合成
            drawCover(ctx, currentFrame, false, canvas.width, canvas.height);
            ctx.restore();

            // 4. ダウンロード
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `yamatane_100th_${isLandscape ? 'landscape' : 'portrait'}_${Date.now()}.png`;
            link.href = dataURL;
            link.click();
        });

        window.addEventListener('DOMContentLoaded', () => {
            updateOrientation();
            startCamera();
        });
    </script>
</body>
</html>
