<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>ヤマタネ100周年 ドローンショー Web ARカメラ</title>
    <style>
        /* 画面全体のスタイル設定 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }

        #ar-container { position: relative; width: 100%; height: 100%; }

        /* 背面：スマホの生カメラ映像 */
        #camera-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        /* 前面：フォトフレーム画像（画面の見た目用） */
        #frame-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 2; pointer-events: none;
            /* 画面上の見た目を強制的にくり抜く */
            -webkit-mask-image: radial-gradient(ellipse 42% 32% at 50% 50%, transparent 95%, black 100%);
            mask-image: radial-gradient(ellipse 42% 32% at 50% 50%, transparent 95%, black 100%);
        }

        /* 撮影用 UIボタンコントロール */
        .ui-layer {
            position: absolute; bottom: 5%; left: 0; width: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        #shutter-btn {
            width: 70px; height: 70px; background-color: #fff;
            border: 5px solid rgba(255,255,255,0.4); border-radius: 50%;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.1s ease;
        }
        #shutter-btn:active { transform: scale(0.9); background-color: #cbd5e1; }

        /* 画像合成・保存用の隠しCanvas */
        #hidden-canvas { display: none; }
    </style>
</head>
<body>

    <div id="ar-container">
        <video id="camera-video" autoplay playsinline muted></video>

        <img id="frame-image" src="./frame_transparent.png" alt="100周年フォトフレーム">

        <div class="ui-layer">
            <button id="shutter-btn" title="写真を撮影"></button>
        </div>
    </div>

    <canvas id="hidden-canvas"></canvas>

    <script>
        const video = document.getElementById('camera-video');
        const frameImage = document.getElementById('frame-image');
        const shutterBtn = document.getElementById('shutter-btn');
        const canvas = document.getElementById('hidden-canvas');

        // スマホの背面カメラを起動
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    video.srcObject = fallbackStream;
                } catch (fallbackErr) {
                    alert("カメラが起動できません。");
                }
            }
        }

        function drawCover(ctx, source, isVideo, canvasWidth, canvasHeight) {
            const srcWidth = isVideo ? source.videoWidth : source.naturalWidth;
            const srcHeight = isVideo ? source.videoHeight : source.naturalHeight;
            const imgRatio = srcWidth / srcHeight;
            const canvasRatio = canvasWidth / canvasHeight;
            let sx, sy, sw, sh;

            if (imgRatio > canvasRatio) {
                sh = srcHeight;
                sw = sh * canvasRatio;
                sx = (srcWidth - sw) / 2;
                sy = 0;
            } else {
                sw = srcWidth;
                sh = sw / canvasRatio;
                sx = 0;
                sy = (srcHeight - sh) / 2;
            }
            ctx.drawImage(source, sx, sy, sw, sh, 0, 0, canvasWidth, canvasHeight);
        }

        // シャッターボタンを押した時の「確実な合成」処理
        shutterBtn.addEventListener('click', () => {
            if (!frameImage.complete || frameImage.naturalWidth === 0) {
                alert("画像が準備中です。少し待ってから再度お試しください。");
                return;
            }

            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // ★修正：どのスマホでも確実に動く「型抜き（クリッピング）」方式に変更

            // 1. まずカメラ映像をCanvas全体に描画（下敷きにする）
            drawCover(ctx, video, true, canvas.width, canvas.height);

            // 2. フレームを描くための「型紙（クリッピングマスク）」を作る
            ctx.save(); // 現在の状態を保存
            ctx.beginPath();
            
            // 画面全体を覆う四角形
            ctx.rect(0, 0, canvas.width, canvas.height);
            // くり抜きたい中央の楕円形を指定
            ctx.ellipse(canvas.width / 2, canvas.height / 2, canvas.width * 0.42, canvas.height * 0.32, 0, 0, 2 * Math.PI);
            
            // 「evenodd」というルールを使って、楕円の【外側だけ】を描画可能なエリアに設定
            ctx.clip('evenodd');

            // 3. 型紙の上からフレーム画像を描画（楕円の中には色が塗られず、カメラ映像が残る）
            drawCover(ctx, frameImage, false, canvas.width, canvas.height);

            // 型紙を外す
            ctx.restore();

            // 4. ダウンロード処理
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `yamatane_100th_photo_${Date.now()}.png`;
            link.href = dataURL;
            link.click();
        });

        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
</html>
</body>
</html>
