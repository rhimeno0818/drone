<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>ヤマタネ100周年 ドローンショー Web ARカメラ</title>
    <style>
        /* 画面全体のスタイル設定 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }

        #ar-container { position: relative; width: 100%; height: 100%; }

        /* 背面：スマホの生カメラ映像 */
        #camera-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        /* 前面：フォトフレーム画像（画面の見た目用） */
        #frame-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 2; pointer-events: none;
            /* ※JavaScriptでスマホの向きに合わせて自動的にくり抜きサイズを書き換えます */
        }

        /* 撮影用 UIボタンコントロール */
        .ui-layer {
            position: absolute; bottom: 5%; left: 0; width: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        #shutter-btn {
            width: 70px; height: 70px; background-color: #fff;
            border: 5px solid rgba(255,255,255,0.4); border-radius: 50%;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.1s ease;
        }
        #shutter-btn:active { transform: scale(0.9); background-color: #cbd5e1; }

        /* 画像合成・保存用の隠しCanvas */
        #hidden-canvas { display: none; }
    </style>
</head>
<body>

    <div id="ar-container">
        <video id="camera-video" autoplay playsinline muted></video>

        <img id="frame-image" src="./frame_portrait.png" alt="100周年フォトフレーム">

        <div class="ui-layer">
            <button id="shutter-btn" title="写真を撮影"></button>
        </div>
    </div>

    <canvas id="hidden-canvas"></canvas>

    <script>
        // ======= 【設定エリア】 =======
        // 画像のファイル名設定
        const SRC_PORTRAIT = "./frame_portrait.png";
        const SRC_LANDSCAPE = "./frame_landscape.png";

        // くり抜く楕円のサイズ設定（画面幅・高さに対する割合）
        // ※もし実際の画像の透明部分とズレる場合は、ここの数値を微調整してください。
        const MASK_PORTRAIT_RX = 42; // 縦向き時の 横幅の割合 (42%)
        const MASK_PORTRAIT_RY = 32; // 縦向き時の 縦幅の割合 (32%)
        const MASK_LANDSCAPE_RX = 46; // 横向き時の 横幅の割合 (46%)
        const MASK_LANDSCAPE_RY = 35; // 横向き時の 縦幅の割合 (35%)
        // ==============================

        const video = document.getElementById('camera-video');
        const frameImage = document.getElementById('frame-image');
        const shutterBtn = document.getElementById('shutter-btn');
        const canvas = document.getElementById('hidden-canvas');
        
        let isLandscape = false;

        // スマホの背面カメラを起動
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    video.srcObject = fallbackStream;
                } catch (fallbackErr) {
                    alert("カメラが起動できません。設定をご確認ください。");
                }
            }
        }

        // スマホの傾き（縦横）を検知して画像を切り替える関数
        function updateOrientation() {
            // 画面の幅と高さを比較して縦横を判定
            isLandscape = window.innerWidth > window.innerHeight;

            if (isLandscape) {
                // 横向きの設定
                frameImage.src = SRC_LANDSCAPE;
                const maskStyle = `radial-gradient(ellipse ${MASK_LANDSCAPE_RX}% ${MASK_LANDSCAPE_RY}% at 50% 50%, transparent 95%, black 100%)`;
                frameImage.style.webkitMaskImage = maskStyle;
                frameImage.style.maskImage = maskStyle;
            } else {
                // 縦向きの設定
                frameImage.src = SRC_PORTRAIT;
                const maskStyle = `radial-gradient(ellipse ${MASK_PORTRAIT_RX}% ${MASK_PORTRAIT_RY}% at 50% 50%, transparent 95%, black 100%)`;
                frameImage.style.webkitMaskImage = maskStyle;
                frameImage.style.maskImage = maskStyle;
            }
        }

        // 画面サイズ（向き）が変わるたびに実行するイベントリスナー
        window.addEventListener('resize', updateOrientation);
        window.addEventListener('orientationchange', () => setTimeout(updateOrientation, 100));

        // 画像のトリミング計算（画面いっぱいに表示するため）
        function drawCover(ctx, source, isVideo, canvasWidth, canvasHeight) {
            const srcWidth = isVideo ? source.videoWidth : source.naturalWidth;
            const srcHeight = isVideo ? source.videoHeight : source.naturalHeight;
            const imgRatio = srcWidth / srcHeight;
            const canvasRatio = canvasWidth / canvasHeight;
            let sx, sy, sw, sh;

            if (imgRatio > canvasRatio) {
                sh = srcHeight;
                sw = sh * canvasRatio;
                sx = (srcWidth - sw) / 2;
                sy = 0;
            } else {
                sw = srcWidth;
                sh = sw / canvasRatio;
                sx = 0;
                sy = (srcHeight - sh) / 2;
            }
            ctx.drawImage(source, sx, sy, sw, sh, 0, 0, canvasWidth, canvasHeight);
        }

        // シャッターボタンを押した時の処理
        shutterBtn.addEventListener('click', () => {
            if (!frameImage.complete || frameImage.naturalWidth === 0) {
                alert("画像の切り替え中です。少し待ってから撮影してください。");
                return;
            }

            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 1. まずカメラ映像をCanvas全体に描画（下敷き）
            drawCover(ctx, video, true, canvas.width, canvas.height);

            // 2. フレームを描くための「型紙（クリッピングマスク）」を作る
            ctx.save();
            ctx.beginPath();
            ctx.rect(0, 0, canvas.width, canvas.height);
            
            // 縦横の向きに合わせて、型抜きのサイズを変更
            let rx = isLandscape ? (canvas.width * (MASK_LANDSCAPE_RX / 100)) : (canvas.width * (MASK_PORTRAIT_RX / 100));
            let ry = isLandscape ? (canvas.height * (MASK_LANDSCAPE_RY / 100)) : (canvas.height * (MASK_PORTRAIT_RY / 100));
            
            ctx.ellipse(canvas.width / 2, canvas.height / 2, rx, ry, 0, 0, 2 * Math.PI);
            ctx.clip('evenodd');

            // 3. 型紙の上からフレーム画像を描画
            drawCover(ctx, frameImage, false, canvas.width, canvas.height);
            ctx.restore();

            // 4. ダウンロード処理
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `yamatane_100th_${isLandscape ? 'landscape' : 'portrait'}_${Date.now()}.png`;
            link.href = dataURL;
            link.click();
        });

        // アプリ起動時の初期設定
        window.addEventListener('DOMContentLoaded', () => {
            updateOrientation(); // 起動時の縦横チェック
            startCamera();       // カメラ起動
        });
    </script>
</body>
</html>
