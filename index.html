<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>ヤマタネ100周年 ドローンショー Web ARカメラ</title>
    <style>
        /* 画面全体のスタイル設定 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }

        /* ARカメラ・コンテナ */
        #ar-container { position: relative; width: 100%; height: 100%; }

        /* 背面：スマホの生カメラ映像 */
        #camera-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; /* 画面いっぱいに比率を保って拡大 */
            z-index: 1;
        }

        /* 前面：透過処理済みのフォトフレーム画像 */
        #frame-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; /* カメラ映像と同じく画面いっぱいに配置 */
            z-index: 2;
            pointer-events: none; /* タップの邪魔にならないようにする */
        }

        /* 撮影用 UIボタンコントロール（最前面） */
        .ui-layer {
            position: absolute; bottom: 5%; left: 0; width: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        #shutter-btn {
            width: 70px; height: 70px; background-color: #fff;
            border: 5px solid rgba(255,255,255,0.4); border-radius: 50%;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.1s ease;
        }
        #shutter-btn:active { transform: scale(0.9); background-color: #cbd5e1; }

        /* 画像合成・保存用の隠しCanvas */
        #hidden-canvas { display: none; }
    </style>
</head>
<body>

    <div id="ar-container">
        <video id="camera-video" autoplay playsinline muted></video>

        <img id="frame-image" src="./frame_transparent.png" alt="100周年フォトフレーム" crossorigin="anonymous" onerror="alert('【エラー】フレーム画像が読み込めません。GitHub上の画像ファイル名が「frame_transparent.png」と完全に一致しているか確認してください。');">

        <div class="ui-layer">
            <button id="shutter-btn" title="写真を撮影"></button>
        </div>
    </div>

    <canvas id="hidden-canvas"></canvas>

    <script>
        const video = document.getElementById('camera-video');
        const frameImage = document.getElementById('frame-image');
        const shutterBtn = document.getElementById('shutter-btn');
        const canvas = document.getElementById('hidden-canvas');

        // スマホの背面カメラを起動
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                // 背面カメラがない場合（PC等）は通常のカメラで代用
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    video.srcObject = fallbackStream;
                } catch (fallbackErr) {
                    alert("カメラの起動に失敗しました。ブラウザのカメラ権限を許可してください。");
                }
            }
        }

        // object-fit: cover と同じトリミング計算を行ってCanvasに描画する関数
        function drawCover(ctx, source, isVideo, canvasWidth, canvasHeight) {
            const srcWidth = isVideo ? source.videoWidth : source.naturalWidth;
            const srcHeight = isVideo ? source.videoHeight : source.naturalHeight;
            const imgRatio = srcWidth / srcHeight;
            const canvasRatio = canvasWidth / canvasHeight;
            let sx, sy, sw, sh;

            if (imgRatio > canvasRatio) {
                sh = srcHeight;
                sw = sh * canvasRatio;
                sx = (srcWidth - sw) / 2;
                sy = 0;
            } else {
                sw = srcWidth;
                sh = sw / canvasRatio;
                sx = 0;
                sy = (srcHeight - sh) / 2;
            }
            ctx.drawImage(source, sx, sy, sw, sh, 0, 0, canvasWidth, canvasHeight);
        }

        // シャッターボタンを押した時の「写真合成・ダウンロード」処理
        shutterBtn.addEventListener('click', () => {
            // 画像が読み込めていない場合は撮影をストップ
            if (!frameImage.complete || frameImage.naturalWidth === 0) {
                alert("フレーム画像が正しく読み込まれていないため、撮影できません。");
                return;
            }

            const ctx = canvas.getContext('2d');
            
            // キャンバスサイズを現在の画面の見た目（スマホ画面）に合わせる
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 1. 生のカメラ映像を画面いっぱいに描画（トリミング補正）
            drawCover(ctx, video, true, canvas.width, canvas.height);

            // 2. 透過フレーム画像をその上に描画（トリミング補正）
            drawCover(ctx, frameImage, false, canvas.width, canvas.height);

            // 3. 自動で画像ファイル(.png)としてスマホにダウンロード保存
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `yamatane_100th_photo_${Date.now()}.png`;
            link.href = dataURL;
            link.click();
        });

        // アプリ起動時にカメラをスタート
        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
